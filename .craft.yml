minVersion: 0.28.1
changelogPolicy: auto
targets:
  - name: maven
    gradleCliPath: ./gradlew
    mavenCliPath: scripts/mvnw
    mavenSettingsPath: scripts/settings.xml
    mavenRepoId: ossrh-staging-api
    mavenRepoUrl: https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/
    android: false
  - name: github
  - name: registry
    sdks:
      maven:io.sentry:sentry-android-gradle-plugin:
      maven:io.sentry:sentry-kotlin-compiler-plugin:
      maven:io.sentry:sentry-snapshots-runtime:
        name: 'io.sentry:sentry-snapshots-runtime'
        sdkName: 'sentry.java.android.snapshots-runtime'
        packageUrl: 'https://search.maven.org/artifact/io.sentry/sentry-snapshots-runtime'
        mainDocsUrl: 'https://docs.sentry.io/platforms/android'
