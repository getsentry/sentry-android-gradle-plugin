name: integration-tests-sentry-cli

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      # sentry-cli 3.6.2+ ignores an auth token when the URL comes from a different
      # configuration source, so the URL and token must share one source. CLI arguments
      # and environment variables count as a single runtime source, so both live here.
      SENTRY_URL: http://127.0.0.1:8000
      SENTRY_AUTH_TOKEN: <token>
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.6'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # pin@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Start server and run integration test for sentry-cli commands
        run: |
          test/integration-test-server-start.sh &
          # Verification is disabled here because the standalone `-p plugin-build` build
          # resolves buildscript-classpath artifacts not captured in the metadata.
          ./gradlew -p plugin-build integrationTest --tests "*IntegrationTest" --dependency-verification=off
